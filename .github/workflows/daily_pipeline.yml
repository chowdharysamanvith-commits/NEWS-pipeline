name: Pharma Intelligence — Daily Pipeline

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC daily (11:30 IST)

  workflow_dispatch:
    inputs:
      query:
        description: "Search query"
        required: false
        default: "monoclonal antibodies"
      days:
        description: "Date window in days"
        required: false
        default: "7"
      domain:
        description: "Single domain only (blank = all)"
        required: false
        default: ""
      no_summarize:
        description: "Skip summarizer? (true/false)"
        required: false
        default: "false"

jobs:
  run-pipeline:
    name: Extract → Merge → Summarize
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_1:     ${{ secrets.GROQ_API_KEY_1 }}
      GROQ_API_KEY_2:     ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3:     ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4:     ${{ secrets.GROQ_API_KEY_4 }}
      GROQ_API_KEY_5:     ${{ secrets.GROQ_API_KEY_5 }}
      GROQ_API_KEY_6:     ${{ secrets.GROQ_API_KEY_6 }}
      NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
      PYTHONPATH:         ${{ github.workspace }}
      PIPELINE_QUERY:     ${{ github.event.inputs.query      || 'monoclonal antibodies' }}
      PIPELINE_DAYS:      ${{ github.event.inputs.days       || '7' }}
      PIPELINE_DOMAIN:    ${{ github.event.inputs.domain     || '' }}
      NO_SUMMARIZE:       ${{ github.event.inputs.no_summarize || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Verify files visible to Python
        run: |
          echo "Working directory: $(pwd)"
          echo "Files present:"
          ls -1 *.py *.json 2>/dev/null || echo "(none)"
          echo "PYTHONPATH: $PYTHONPATH"

      - name: Run extraction pipeline
        run: |
          DOMAIN_ARG=""
          if [ -n "$PIPELINE_DOMAIN" ]; then
            DOMAIN_ARG="--domain $PIPELINE_DOMAIN"
          fi

          SUMMARIZE_ARG=""
          if [ "$NO_SUMMARIZE" = "true" ]; then
            SUMMARIZE_ARG="--no-summarize"
          fi

          python run_pipeline.py \
            --query  "$PIPELINE_QUERY" \
            --days   "$PIPELINE_DAYS"  \
            $DOMAIN_ARG                \
            $SUMMARIZE_ARG

      - name: Archive outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            extraction_output/
            data/briefs/
            data/archive/
          retention-days: 90

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ extraction_output/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: pipeline run ${DATE} — query='${PIPELINE_QUERY}' days=${PIPELINE_DAYS} [skip ci]"
            git push
          fi
