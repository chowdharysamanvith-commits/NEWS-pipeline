name: Pharma Intelligence — Daily Pipeline

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC daily (11:30 IST)

  workflow_dispatch:
    inputs:
      days:
        description: "Date window in days"
        required: false
        default: "7"
      no_summarize:
        description: "Skip summarizer? (true/false)"
        required: false
        default: "false"

jobs:
  run-pipeline:
    name: Extract → Merge → Summarize (all modalities)
    runs-on: ubuntu-latest
    timeout-minutes: 180     # 4 modalities × ~40min each

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_1:     ${{ secrets.GROQ_API_KEY_1 }}
      GROQ_API_KEY_2:     ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3:     ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4:     ${{ secrets.GROQ_API_KEY_4 }}
      GROQ_API_KEY_5:     ${{ secrets.GROQ_API_KEY_5 }}
      GROQ_API_KEY_6:     ${{ secrets.GROQ_API_KEY_6 }}
      NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
      PYTHONPATH:         ${{ github.workspace }}
      PIPELINE_DAYS:      ${{ github.event.inputs.days || '7' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Verify repo files visible to Python
        run: |
          echo "Working directory: $(pwd)"
          ls -1 *.py *.json 2>/dev/null || echo "(no .py/.json at root)"
          echo "PYTHONPATH: $PYTHONPATH"

      - name: Run all modalities
        run: python run_all_modalities.py

      - name: Archive all outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            data/
          retention-days: 90

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: daily pipeline ${DATE} — all 4 modalities [skip ci]"
            git push
          fi
