name: Pharma Intelligence — Daily Pipeline

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC daily (11:30 IST)
  workflow_dispatch:
    inputs:
      days:
        description: "Date window in days"
        required: false
        default: "7"
      no_summarize:
        description: "Skip summarizer? (true/false)"
        required: false
        default: "false"

jobs:
  run-pipeline:
    name: Extract → Merge → Summarize (all modalities)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      GROQ_API_KEY_1:  ${{ secrets.GROQ_API_KEY_1 }}
      GROQ_API_KEY_2:  ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3:  ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4:  ${{ secrets.GROQ_API_KEY_4 }}
      GROQ_API_KEY_5:  ${{ secrets.GROQ_API_KEY_5 }}
      GROQ_API_KEY_6:  ${{ secrets.GROQ_API_KEY_6 }}
      NVIDIA_API_KEY:  ${{ secrets.NVIDIA_API_KEY }}
      PYTHONPATH:      ${{ github.workspace }}
      PIPELINE_DAYS:   ${{ github.event.inputs.days || '7' }}

    steps:

      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # ── 2. Python ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencies ─────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Playwright ───────────────────────────────────────
      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      # ── 5. Pre-run Debug ────────────────────────────────────
      - name: Verify workspace before run
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Repo root files ==="
          ls -la $GITHUB_WORKSPACE
          echo "=== extraction_output before run ==="
          ls -la $GITHUB_WORKSPACE/extraction_output/ || echo "(empty / does not exist)"
          echo "=== PYTHONPATH ==="
          echo $PYTHONPATH

      # ── 6. Run Pipeline ─────────────────────────────────────
      - name: Run all modalities
        run: python run_all_modalities.py

      # ── 7. Post-run Debug ───────────────────────────────────
      - name: Debug outputs after run
        if: always()
        run: |
          echo "=== ALL JSON files written ==="
          find $GITHUB_WORKSPACE -name "*.json" | sort
          echo ""
          echo "=== extraction_output ==="
          ls -lh $GITHUB_WORKSPACE/extraction_output/ || echo "(missing)"
          echo ""
          echo "=== data ==="
          ls -lh $GITHUB_WORKSPACE/data/ || echo "(missing)"
          echo ""
          echo "=== *_results.json ==="
          find $GITHUB_WORKSPACE -name "*_results.json" | sort || echo "none found"

      # ── 8. Upload Artifacts ─────────────────────────────────
      - name: Archive pipeline outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/data/
            ${{ github.workspace }}/extraction_output/
          retention-days: 90

      # ── 9. Commit & Push (FIXED) ────────────────────────────
      - name: Commit results to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p $GITHUB_WORKSPACE/extraction_output
          mkdir -p $GITHUB_WORKSPACE/data
          mkdir -p $GITHUB_WORKSPACE/logs

          touch $GITHUB_WORKSPACE/extraction_output/.gitkeep
          touch $GITHUB_WORKSPACE/data/.gitkeep
          touch $GITHUB_WORKSPACE/logs/.gitkeep

          git add -f $GITHUB_WORKSPACE/extraction_output/ || true
          git add -f $GITHUB_WORKSPACE/data/ || true
          git add -f $GITHUB_WORKSPACE/logs/ || true

          echo "=== GIT STATUS ==="
          git status

          echo "=== STAGED FILES ==="
          git diff --staged --name-only

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: pipeline results ${DATE} [skip ci]"

            # 🔥 FIX: avoid push rejection
            git pull origin main --rebase || true

            git push origin HEAD:main
            echo "Push successful."
          fi
